---
layout: default
---
<article class="post-shell">
  <a class="back-link" href="{{ '/' | relative_url }}">&larr; 返回首页</a>
  <header class="post-header">
    <span class="post-meta">{{ page.date | date: "%Y.%m.%d" }}</span>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="glass-panel post-article">
    {{ content }}
  </div>
</article>
